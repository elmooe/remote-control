<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Remote Control">
  <meta name="theme-color" content="#161b22">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/static/icon.png">
  <title>Remote Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script defer src="/static/app.js"></script>
</head>
<body class="h-dvh flex flex-col overflow-hidden select-none bg-[#0d1117] text-[#e6edf3]">

<header class="flex justify-between items-center px-4 py-2.5 bg-[#161b22] border-b border-[#21262d] shrink-0">
  <span class="text-sm font-bold">Remote Control</span>
  <div class="flex items-center gap-3">
    <div class="flex items-center gap-1.5 text-xs text-[#8b949e]">
      <div id="dot" class="w-2 h-2 rounded-full bg-red-500 transition-colors duration-300"></div>
      <span id="status-text">Connecting…</span>
    </div>
    <button id="settings-btn" class="text-[#8b949e] hover:text-[#e6edf3] transition-colors p-1" aria-label="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</header>

<!-- Settings popup -->
<div id="settings-popup" class="hidden absolute top-12 right-3 z-50 bg-[#161b22] border border-[#30363d] rounded-xl shadow-2xl p-4 w-64 flex-col gap-4">
  <p class="text-xs font-semibold text-[#8b949e] uppercase tracking-wider">Settings</p>
  <div class="flex flex-col gap-1.5">
    <div class="flex justify-between text-xs text-[#6e7681]">
      <span>Cursor Speed</span>
      <span id="speed-val">2.5</span>
    </div>
    <input type="range" id="speed" min="0.5" max="6" step="0.1" value="2.5" class="w-full accent-blue-400 cursor-pointer">
  </div>
  <div class="flex flex-col gap-1.5">
    <div class="flex justify-between text-xs text-[#6e7681]">
      <span>Scroll Speed</span>
      <span id="scroll-speed-val">2.0</span>
    </div>
    <input type="range" id="scroll-speed" min="0.5" max="8" step="0.1" value="2.0" class="w-full accent-blue-400 cursor-pointer">
  </div>
</div>

<nav class="flex bg-[#161b22] border-b border-[#21262d] shrink-0">
  <button class="tab-btn flex-1 py-2.5 text-center text-sm font-medium cursor-pointer border-b-2 border-[#58a6ff] text-[#58a6ff] transition-colors" data-tab="trackpad">Trackpad</button>
  <button class="tab-btn flex-1 py-2.5 text-center text-sm font-medium cursor-pointer border-b-2 border-transparent text-[#8b949e] transition-colors" data-tab="keyboard">Keyboard</button>
</nav>

<!-- Trackpad Panel -->
<div class="panel flex flex-col flex-1 min-h-0" id="trackpad-panel">

  <div id="trackpad" class="flex-1 bg-[#0d1117] touch-none relative flex items-center justify-center">
    <img src="/static/trackpad-icon.png" class="w-20 h-20 mx-auto mb-1.5 opacity-80" alt="tap">
  </div>

  <div class="flex gap-2 p-2 bg-[#161b22] border-t border-[#21262d] shrink-0">
    <button id="btn-left"  class="flex-1 py-4 rounded-xl text-sm font-semibold bg-[#21262d] border border-[#58a6ff] text-[#58a6ff] active:brightness-150 transition-all">Left Click</button>
    <button id="btn-right" class="flex-1 py-4 rounded-xl text-sm font-semibold bg-[#21262d] border border-[#f78166] text-[#f78166] active:brightness-150 transition-all">Right Click</button>
  </div>

</div>

<!-- Keyboard Panel -->
<div class="panel hidden flex-col flex-1 min-h-0 bg-[#0d1117]" id="keyboard-panel">

  <!-- Off-screen capture — invisible but focusable; font-size:16px prevents iOS zoom -->
  <textarea id="capture"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
    class="fixed opacity-0 -top-[200px] -left-[200px] w-px h-px resize-none border-none outline-none text-base"
  ></textarea>

  <!-- Tap-to-type zone -->
  <div id="type-btn" class="flex-1 flex flex-col items-center justify-center gap-4 cursor-pointer select-none">
    <div class="text-6xl">⌨️</div>
    <p id="kbd-label" class="text-[#8b949e] text-sm font-medium transition-colors">Tap to open keyboard</p>
    <p class="text-[#30363d] text-xs text-center px-8">Touch the screen to open keyboard</p>
  </div>

</div>

</body>
</html>
